    <style>
        /* ВСЕ СТИЛИ ИЗ ТВОЕГО КОДА (СОХРАНЕНЫ ПОЛНОСТЬЮ) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {

        /* ===== УРОВЕНЬ 6: Скрытая ссылка ===== */

        /* ===== ОСТАЛЬНЫЕ СТИЛИ ИЗ ТВОЕГО КОДА ===== */

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); } 50% { box-shadow: 0 0 50px rgba(139, 92, 246, 0.6); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes matrixRain { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }
        @keyframes glitchSweep { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

function renderGeo(){if(!currentUser){navigateTo('login');return}pageContainer.innerHTML='<div class="geo-container"><h1>🌐 Геолокация по IP</h1><p style="color:var(--text-secondary);margin-bottom:16px;">Введите IP адрес для определения местоположения. Реальные данные.</p><div class="price-info">💰 Стоимость: <strong>$2</strong> за один поиск</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;"><input type="text" id="ipInput" placeholder="Введите IP (например: 8.8.8.8)" style="flex:1;min-width:200px;"><button class="btn btn-purple btn-glitch" onclick="handleGeoSearch()">🔍 ОПРЕДЕЛИТЬ ($2)</button><button class="btn btn-outline" onclick="getMyIp()">📍 МОЙ IP</button></div><div id="geoResult" style="margin-top:20px;"></div></div>'}
window.handleGeoSearch=async function(){if(!currentUser){showModal('❌ Ошибка','Войдите в аккаунт!');return}const ipInput=document.getElementById('ipInput');const ip=ipInput.value.trim();if(!ip){showModal('❌ Ошибка','Введите IP адрес');return}if((currentUser.balance||0)<2){showModal('❌ Недостаточно средств','<div style="text-align:center;padding:10px;"><div style="font-size:48px;margin-bottom:12px;">💸</div><p style="font-size:18px;font-weight:700;color:var(--accent-red);">Недостаточно средств для поиска</p><p style="font-size:14px;color:var(--text-secondary);margin:8px 0;">Стоимость одного поиска: <strong style="color:var(--accent-gold);">$2</strong></p></div>',[{label:'💎 ПОПОЛНИТЬ',cls:'btn-gold',action:function(){closeModal();window.showDepositModal()}}]);return}const confirmSearch=await new Promise((resolve)=>{showModal('🔍 ПОИСК ПО IP','<div style="text-align:center;padding:10px;"><div style="font-size:48px;margin-bottom:12px;">🌐</div><p style="font-size:18px;font-weight:700;color:var(--accent-gold);">Поиск по IP: <strong>'+ip+'</strong></p><p style="font-size:14px;color:var(--text-secondary);margin:8px 0;">Стоимость: <strong style="color:var(--accent-green);">$2</strong></p><div style="margin:16px 0;padding:16px;background:var(--bg-surface-2);border-radius:var(--radius-sm);"><p style="font-size:14px;">💰 Будет списано <strong style="color:var(--accent-gold);">$2</strong> с вашего баланса</p><p style="font-size:13px;color:var(--text-secondary);margin-top:4px;">Баланс: <strong>'+formatCurrency(currentUser.balance)+'</strong></p></div></div>',[{label:'💎 ОПЛАТИТЬ $2',cls:'btn-gold',action:function(){closeModal();resolve(true)}},{label:'❌ ОТМЕНА',cls:'btn-outline',action:function(){closeModal();resolve(false)}}],'🔍')});if(!confirmSearch)return;currentUser.balance-=2;localStorage.setItem(USER_KEY,JSON.stringify(currentUser));userBalance.textContent=formatCurrency(currentUser.balance);showNotification('💳 Списано $2 за поиск','warning');const r=document.getElementById('geoResult');r.innerHTML='<p style="color:var(--accent-gold);">⏳ Поиск информации по IP '+ip+'...</p>';try{const resp=await fetch('https://ipapi.co/'+ip+'/json/');if(!resp.ok)throw new Error('API error');const data=await resp.json();if(data.error){r.innerHTML='<p style="color:var(--accent-red);">❌ IP не найден или ошибка API</p>';return}const flag=data.country_code?String.fromCodePoint(...data.country_code.toUpperCase().split('').map(c=>127397+c.charCodeAt(0))):'🌍';r.innerHTML='<div class="geo-card"><h3 style="color:var(--accent-purple);margin-bottom:12px;">'+flag+' Результат для IP: <strong style="color:var(--text-white);">'+ip+'</strong></h3><div class="geo-row"><span style="color:var(--text-secondary);">🌍 Страна:</span> <strong>'+(data.country_name||'—')+'</strong></div><div class="geo-row"><span style="color:var(--text-secondary);">🏙️ Город:</span> <strong>'+(data.city||'—')+'</strong></div><div class="geo-row"><span style="color:var(--text-secondary);">📍 Регион:</span> <strong>'+(data.region||'—')+'</strong></div><div class="geo-row"><span style="color:var(--text-secondary);">📡 Провайдер:</span> <strong>'+(data.org||data.asn||'—')+'</strong></div><div class="geo-row"><span style="color:var(--text-secondary);">🗺️ Координаты:</span> <strong>'+(data.latitude||'—')+', '+(data.longitude||'—')+'</strong></div><div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border-color);display:flex;gap:16px;flex-wrap:wrap;"><a href="https://www.google.com/maps?q='+data.latitude+','+data.longitude+'" target="_blank" style="color:var(--accent-purple);text-decoration:none;font-weight:600;">🗺️ Открыть на карте</a></div><div class="price-info">💰 Оплачено: $2</div></div>'}catch(e){r.innerHTML='<p style="color:var(--accent-red);">❌ Ошибка при получении данных.</p>'}}
window.getMyIp=async function(){try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();document.getElementById('ipInput').value=d.ip;handleGeoSearch()}catch(e){showModal('❌ Ошибка','Не удалось определить ваш IP')}}

async function renderAttack(d){if(!currentUser){navigateTo('login');return}let botnets=[];try{const r=await apiFetch('/my-botnets');if(!r.error)botnets=r.filter(b=>b.active)}catch(e){}const types=['HTTP_GET_FLOOD','HTTP_POST_FLOOD','HTTPS_FLOOD','SLOWLORIS','SYN_FLOOD','UDP_FLOOD','ICMP_FLOOD','HTTP_HEADERS_FLOOD','MULTI_VECTOR'];pageContainer.innerHTML='<div class="attack-panel"><h1>⚔️ Запуск атаки</h1><div style="display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;"><span class="target-status online" id="targetStatus">🟢 Цель: неизвестно</span><span id="attackTimer" style="color:var(--text-secondary);">⏱ 0с</span><button class="btn btn-outline btn-sm" id="stopAttackBtn" onclick="handleStopAttack()" disabled>■ ОСТАНОВИТЬ</button></div><div class="form-group"><label>🤖 Ботнет</label><select id="attackBotnet">'+(botnets.length===0?'<option value="">— Нет активных —</option>':botnets.map(b=>'<option value="'+b.id+'">'+b.bot_count+' ботов (до '+formatDate(b.expires_at)+')</option>').join(''))+'</select></div><div class="form-group"><label>🎯 Цель</label><input type="text" id="attackTarget" placeholder="https://example.com или 192.168.1.1"></div><div class="form-group"><label>💥 Тип атаки</label><select id="attackType">'+types.map(t=>'<option value="'+t+'">'+t.replace(/_/g,' ')+'</option>').join('')+'</select></div><div class="form-group"><label>⏱ Длительность (сек): <span id="durationLabel">60</span></label><input type="range" id="durationSlider" min="10" max="3600" step="10" value="60"><div class="slider-labels"><span>10с</span><span>3600с</span></div></div><button class="btn btn-red btn-lg btn-glitch" id="startAttackBtn" onclick="handleStartAttack()" style="width:100%;">▶ ЗАПУСТИТЬ</button><div class="stats-grid" id="attackStats"><div class="stat-box"><div class="stat-value" id="statRequests">0</div><div class="stat-label">Запросов</div></div><div class="stat-box"><div class="stat-value" id="statErrors">0</div><div class="stat-label">Успешно</div></div><div class="stat-box"><div class="stat-value" id="statRps">0</div><div class="stat-label">RPS</div></div><div class="stat-box"><div class="stat-value" id="statBytes">0</div><div class="stat-label">Данных (KB)</div></div><div class="stat-box"><div class="stat-value" id="statStatus">🟢</div><div class="stat-label">Статус цели</div></div></div><div class="progress-bar"><div class="fill" id="attackProgress" style="width:0%;"></div></div><div class="log-terminal" id="attackLog"><div class="log-line"><span class="time">['+new Date().toLocaleTimeString()+']</span> ⚡ Ожидание запуска...</div></div></div>';const ds=document.getElementById('durationSlider');if(ds)ds.addEventListener('input',()=>{const lbl=document.getElementById('durationLabel');if(lbl)lbl.textContent=ds.value});if(d&&d.attackId){activeAttackId=d.attackId;startAttackMonitoring(activeAttackId)}}
window.handleStartAttack=async function(){const bid=parseInt(document.getElementById('attackBotnet').value);const target=document.getElementById('attackTarget').value.trim();const type=document.getElementById('attackType').value;const dur=parseInt(document.getElementById('durationSlider').value);if(!bid){showModal('Ошибка','Выберите активный ботнет');return}if(!target){showModal('Ошибка','Введите цель');return}try{const r=await apiFetch('/attack',{method:'POST',body:JSON.stringify({botnet_id:bid,target,attack_type:type,duration:dur})});if(r.error){showModal('Ошибка',r.error);return}if(r.success){activeAttackId=r.attack_id;document.getElementById('startAttackBtn').disabled=true;document.getElementById('stopAttackBtn').disabled=false;showNotification('🚀 Атака запущена на '+target,'success');addLogLine('🚀 Атака запущена на '+target+' (ID: '+r.attack_id+')');startAttackMonitoring(activeAttackId)}}catch(e){showModal('Ошибка','Сервер недоступен')}}
window.handleStopAttack=async function(){if(!activeAttackId)return;try{const r=await apiFetch('/attack/'+activeAttackId+'/stop',{method:'POST'});if(r.success){showNotification('⏹ Атака остановлена','warning');addLogLine('⏹ Атака остановлена');document.getElementById('startAttackBtn').disabled=false;document.getElementById('stopAttackBtn').disabled=true;if(attackInterval){clearInterval(attackInterval);attackInterval=null}activeAttackId=null}else showModal('Ошибка',r.error||'Не удалось остановить')}catch(e){showModal('Ошибка','Сервер недоступен')}}
function startAttackMonitoring(id){if(attackInterval)clearInterval(attackInterval);addLogLine('📡 Мониторинг атаки '+id+'...');let start=Date.now();attackInterval=setInterval(async()=>{try{const r=await apiFetch('/attack/'+id+'/status');if(r.error){addLogLine('❌ Ошибка: '+r.error);return}const s=r.stats||{};const elapsed=Math.floor((Date.now()-start)/1000);document.getElementById('statRequests').textContent=s.total_requests||0;document.getElementById('statErrors').textContent=s.failed_requests||0;document.getElementById('statRps').textContent=s.rps||0;document.getElementById('statBytes').textContent=s.bytes_sent?Math.round(s.bytes_sent/1024):0;const status=s.target_status||'online';document.getElementById('statStatus').textContent=status==='online'?'🟢':'🔴';document.getElementById('targetStatus').textContent=status==='online'?'🟢 Цель: онлайн':'🔴 Цель: офлайн (УСПЕХ!)';document.getElementById('targetStatus').className='target-status '+status;document.getElementById('attackTimer').textContent='⏱ '+elapsed+'с / '+(r.duration_seconds||0)+'с';const progress=r.duration_seconds?Math.min(100,(elapsed/r.duration_seconds)*100):0;document.getElementById('attackProgress').style.width=progress+'%';if(r.status!=='running'){addLogLine('🏁 Атака завершена. Статус: '+r.status+'.');clearInterval(attackInterval);attackInterval=null;document.getElementById('startAttackBtn').disabled=false;document.getElementById('stopAttackBtn').disabled=true;activeAttackId=null;showNotification('🏁 Атака завершена!','success')}}catch(e){}},1000)}
function addLogLine(msg){const log=document.getElementById('attackLog');if(!log)return;const line=document.createElement('div');line.className='log-line';line.innerHTML='<span class="time">['+new Date().toLocaleTimeString()+']</span> '+msg;log.appendChild(line);log.scrollTop=log.scrollHeight}

async function renderProfile(){if(!currentUser){navigateTo('login');return}pageContainer.innerHTML='<h1>👤 Профиль</h1><div class="dash-card" style="max-width:500px;"><div class="form-group"><label>Логин</label><input type="text" value="'+currentUser.username+'" disabled></div><div class="form-group"><label>Email</label><input type="email" value="'+(currentUser.email||'')+'" disabled></div><div class="form-group"><label>💰 Баланс</label><input type="text" value="'+formatCurrency(currentUser.balance)+'" disabled style="color:var(--accent-green);"></div><div class="form-group"><label>Роль</label><input type="text" value="'+(currentUser.role||'user')+'" disabled></div>'+(currentUser.api_key?'<div class="form-group"><label>🔑 API Key</label><input type="text" value="'+currentUser.api_key+'" disabled></div>':'')+'<div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn btn-gold btn-glitch" onclick="window.showDepositModal()">💎 ПОПОЛНИТЬ</button><button class="btn btn-outline" style="color:var(--accent-red);" onclick="logout()">🚪 Выйти</button></div></div><h2 style="margin-top:24px;">📦 Мои ботнеты</h2><div id="profileBotnets" class="botnet-list"></div>';try{const b=await apiFetch('/my-botnets');if(!b.error){const c=document.getElementById('profileBotnets');if(!c)return;if(b.length===0){c.innerHTML='<p style="color:var(--text-secondary);">Нет ботнетов.</p>'}else{c.innerHTML=b.map(x=>'<div class="botnet-item '+(x.active?'':'expired')+'"><div class="info"><div class="count">🤖 '+x.bot_count+' ботов</div><div class="meta">'+x.duration_days+' дней · '+formatCurrency(x.price)+'</div></div><div class="status '+(x.active?'active':'expired')+'">'+(x.active?'✅ Активен':'⏳ Истёк')+'</div></div>').join('')}}}catch(e){}}
async function renderAdmin(){if(!currentUser||currentUser.role!=='admin'){navigateTo('home');return}pageContainer.innerHTML='<h1>🔧 Админ-панель</h1><div class="dash-card" style="margin:16px 0;border-color:var(--accent-gold);"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;"><span style="font-size:20px;font-weight:700;color:var(--accent-gold);">💎 ПОПОЛНИТЬ БАЛАНС</span><input type="text" id="depositUsername" placeholder="Логин пользователя" style="flex:1;min-width:150px;"><input type="number" id="depositAmount" placeholder="Сумма $" style="width:150px;"><button class="btn btn-green btn-glitch" onclick="window.adminDeposit()">💎 ПОПОЛНИТЬ</button></div></div><div class="dash-grid" id="adminStats"></div><h2 style="margin-top:24px;">👥 Пользователи</h2><div id="adminUsers"></div>';await refreshAdmin()}
async function refreshAdmin(){try{const s=await apiFetch('/admin/stats');if(!s.error){const c=document.getElementById('adminStats');if(!c)return;c.innerHTML='<div class="dash-card"><div class="card-title">👥 Пользователей</div><div class="card-value purple">'+(s.total_users||0)+'</div></div><div class="dash-card"><div class="card-title">🤖 Продано ботнетов</div><div class="card-value green">'+(s.total_botnets||0)+'</div></div><div class="dash-card"><div class="card-title">⚔️ Активных атак</div><div class="card-value red">'+(s.active_attacks||0)+'</div></div><div class="dash-card"><div class="card-title">💰 Доход (без админа)</div><div class="card-value gold">'+formatCurrency(s.total_revenue||0)+'</div></div>'}const u=await apiFetch('/admin/users');if(!u.error){const c=document.getElementById('adminUsers');if(!c)return;let html='<table class="admin-table"><thead><tr><th>ID</th><th>Логин</th><th>Email</th><th>Баланс</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';u.forEach(x=>{const banned=x.banned===1||x.banned===true;html+='<tr><td>'+x.id+'</td><td>'+x.username+'</td><td>'+(x.email||'')+'</td><td style="color:var(--accent-green);font-weight:700;">'+formatCurrency(x.balance)+'</td><td><span class="badge '+(x.role==='admin'?'admin':'user')+'">'+(x.role||'user')+'</span></td><td>'+(banned?'<span class="badge banned">Забанен</span>':'✅ Активен')+'</td><td>'+(banned?'<button class="btn btn-green btn-sm" onclick="adminUnban('+x.id+')">Разбан</button>':'<button class="btn btn-red btn-sm" onclick="adminBan('+x.id+')">Забанить</button>')+'</td></tr>'});html+='</tbody></table>';c.innerHTML=html}}catch(e){}}
window.adminBan=async function(id){if(!confirm('Забанить пользователя?'))return;try{const r=await apiFetch('/admin/ban/'+id,{method:'POST'});if(r.success){refreshAdmin();showModal('✅','Пользователь забанен')}else showModal('Ошибка',r.error||'')}catch(e){showModal('Ошибка','Сервер недоступен')}}
window.adminUnban=async function(id){try{const r=await apiFetch('/admin/unban/'+id,{method:'POST'});if(r.success){refreshAdmin();showModal('✅','Пользователь разбанен')}else showModal('Ошибка',r.error||'')}catch(e){showModal('Ошибка','Сервер недоступен')}}
window.adminDeposit=async function(){const u=document.getElementById('depositUsername').value.trim();const a=parseFloat(document.getElementById('depositAmount').value);if(!u||!a||a<=0){showModal('❌ Ошибка','Введите логин и сумму (больше 0)');return}try{const r=await apiFetch('/admin/add_balance',{method:'POST',body:JSON.stringify({username:u,amount:a})});if(r.error){showModal('❌ Ошибка',r.error);return}if(r.success){showModal('✅ Пополнено!','<p>💰 Новый баланс <strong>'+r.username+'</strong>: <strong style="color:var(--accent-green);">'+formatCurrency(r.new_balance)+'</strong></p><p>➕ Добавлено: <strong style="color:var(--accent-gold);">'+formatCurrency(r.added)+'</strong></p>',[{label:'🔄 Обновить',cls:'btn-purple',action:'()=>{ closeModal(); refreshAdmin(); }'}]);setTimeout(refreshAdmin,500)}}catch(e){showModal('❌ Ошибка','Сервер недоступен')}}
window.showDepositModal=function(){showModal('💎 Пополнение баланса','<p style="font-size:16px;">Пополните баланс для покупки ботнетов и поисков.</p>',[{label:'📱 Написать @VO1D_NETWORK',cls:'btn-gold',action:'()=>{ window.open("https://t.me/VO1D_NETWORK","_blank"); }'}],'💰',true)}
window.logout=function(){localStorage.removeItem(TOKEN_KEY);localStorage.removeItem(USER_KEY);currentUser=null;if(attackInterval){clearInterval(attackInterval);attackInterval=null}activeAttackId=null;showNotification('👋 Вы вышли из системы','info');navigateTo('home')}

function init(){
    const saved=localStorage.getItem(USER_KEY);
    if(saved){try{currentUser=JSON.parse(saved);const token=localStorage.getItem(TOKEN_KEY);if(!token){currentUser=null;localStorage.removeItem(USER_KEY)}}catch(e){currentUser=null}}
    if(localStorage.getItem('phantom_solved')==='true'){Object.keys(puzzleProgress).forEach(k=>puzzleProgress[k]=true)}
    renderNav();navigateTo(currentUser?'dashboard':'home');initFakeNotifications();
    setInterval(async()=>{if(currentUser){try{const p=await apiFetch('/profile');if(!p.error){currentUser.balance=p.balance;localStorage.setItem(USER_KEY,JSON.stringify(currentUser));userBalance.textContent=formatCurrency(currentUser.balance)}}catch(e){}}},30000);
    setInterval(()=>{if(Object.values(puzzleProgress).every(v=>v===true)){localStorage.setItem('phantom_solved','true')}},5000)
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
